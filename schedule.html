<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 PKNU AI 특화 공동훈련센터 (PKNU AX Academy) 일정 안내</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chosen Palette: Indigo & Slate Professional -->
    <!-- Application Structure Plan: 훈련 지원자가 모든 정보를 한눈에 비교할 수 있도록 통합된 테이블(표) 구조를 유지하며, 기관 명칭을 PKNU AI 특화 공동훈련센터 (PKNU AX Academy)로 업데이트하여 공식적인 신뢰도를 높였습니다. -->
    <!-- Visualization & Content Choices: 1. 반응형 테이블: 11개 과정의 데이터를 행 단위로 정리. 2. 국문 단위 표기: 지원자의 이해를 돕기 위해 '일'과 '시간' 단위를 명시함. 3. 브랜드 아이덴티티: 헤더와 푸터에 지정된 기관 명칭을 반영. NO SVG/Mermaid. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        .active-tab {
            background-color: #4f46e5;
            color: white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        tr:hover {
            background-color: #f1f5f9;
        }
    </style>
</head>
<body class="antialiased">

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
        
        <!-- Header -->
        <header class="mb-10 text-center">
            <span class="inline-block px-3 py-1 mb-3 text-xs font-semibold tracking-wider text-indigo-600 uppercase bg-indigo-50 rounded-full">PKNU AX Academy</span>
            <h1 class="text-2xl md:text-3xl font-black text-slate-900 tracking-tight mb-3">2026 PKNU AI 특화 공동훈련센터 교육 일정</h1>
            <p class="text-slate-500 text-sm md:text-base max-w-2xl mx-auto">
                본 과정은 주말(토/일) 과정으로 운영됩니다. 아래 표에서 교육 유형과 일정을 확인해 주세요.
            </p>
        </header>

        <!-- Filter Tabs -->
        <div class="flex justify-center mb-8">
            <div class="inline-flex p-1 bg-slate-200 rounded-xl shadow-inner">
                <button onclick="filterCurriculum('all')" id="tab-all" class="px-5 py-2 rounded-lg text-xs font-bold transition-all duration-200 active-tab">전체 과정</button>
                <button onclick="filterCurriculum('AX일반')" id="tab-general" class="px-5 py-2 rounded-lg text-xs font-bold transition-all duration-200 text-slate-600 hover:text-slate-900">AX 일반</button>
                <button onclick="filterCurriculum('AX전문')" id="tab-expert" class="px-5 py-2 rounded-lg text-xs font-bold transition-all duration-200 text-slate-600 hover:text-slate-900">AX 전문</button>
            </div>
        </div>

        <!-- Schedule Table Section -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-[10px] font-bold uppercase tracking-widest border-b border-slate-200">
                            <th class="px-4 py-4 text-center">구분</th>
                            <th class="px-4 py-4">과정명</th>
                            <th class="px-4 py-4 text-center">교육 시간</th>
                            <th class="px-4 py-4">1회차 일정</th>
                            <th class="px-4 py-4">2회차 일정</th>
                            <th class="px-4 py-4 text-center">신청</th>
                        </tr>
                    </thead>
                    <tbody id="curriculum-body" class="divide-y divide-slate-100">
                        <!-- Rows dynamically generated here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="no-results" class="hidden text-center py-20 bg-white rounded-2xl border border-slate-200 mt-6">
            <p class="text-slate-400 font-medium">해당 유형의 과정이 없습니다.</p>
        </div>

    </main>

    <footer class="py-10 text-center border-t border-slate-100 mt-12 bg-white">
        <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2">PKNU AI 특화 공동훈련센터 (PKNU AX Academy)</p>
    
    </footer>

    <script>
        const curriculumData = [
            { id: 1, type: "AX일반", name: "생성형 AI 기반 업무 생산성 혁신 실무", hours: 16, days: 2, s1: "05.16 ~ 05.17", s2: "09.19 ~ 09.20" },
            { id: 2, type: "AX일반", name: "AI 윤리·보안·리스크 관리 입문", hours: 8, days: 1, s1: "05.30 (토)", s2: "10.17 (토)" },
            { id: 3, type: "AX일반", name: "생성형 AI 업무 활용 프롬프트 설계 실무", hours: 16, days: 2, s1: "06.13 ~ 06.14", s2: "10.17 ~ 10.18" },
            { id: 4, type: "AX일반", name: "AI 기반 데이터 시각화 및 인사이트 도출 실무", hours: 16, days: 2, s1: "07.04 ~ 07.05", s2: "11.07 ~ 11.08" },
            { id: 5, type: "AX일반", name: "AI 업무 자동화 바이브 코딩 실무", hours: 16, days: 2, s1: "07.11 ~ 07.12", s2: "11.07 ~ 11.08" },
            { id: 6, type: "AX일반", name: "AI 활용 업무 개선 아이디어 설계 실무", hours: 12, days: 2, s1: "08.01 ~ 08.02", s2: "12.12 ~ 12.13" },
            { id: 7, type: "AX일반", name: "AI 적용 성과평가 및 개선 방향 도출 실무", hours: 12, days: 2, s1: "08.08 ~ 08.09", s2: "12.12 ~ 12.13" },
            { id: 8, type: "AX전문", name: "생성형 AI 모델 파인튜닝 실무", hours: 30, days: 4, s1: "06.20 ~ 06.28", s2: "10.24 ~ 11.01" },
            { id: 9, type: "AX전문", name: "AI 에이전트 기반 업무 지능화 개발", hours: 30, days: 4, s1: "07.18 ~ 07.26", s2: "11.14 ~ 11.22" },
            { id: 10, type: "AX전문", name: "제조물류 특화 딥러닝 이상 탐지 과정", hours: 30, days: 4, s1: "08.22 ~ 08.30", s2: "11.28 ~ 12.06" },
            { id: 11, type: "AX전문", name: "MLOps 기반 AI 서비스 배포 및 운영 자동화실무", hours: 30, days: 4, s1: "09.05 ~ 09.13", s2: "12.05 ~ 12.13" }
        ];

        function renderCurriculum(filterType = 'all') {
            const body = document.getElementById('curriculum-body');
            const noResults = document.getElementById('no-results');
            body.innerHTML = '';

            const filteredData = filterType === 'all' 
                ? curriculumData 
                : curriculumData.filter(d => d.type === filterType);

            if (filteredData.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');

            filteredData.forEach(course => {
                const tr = document.createElement('tr');
                tr.className = "text-slate-700 transition-colors";
                
                const typeBadge = course.type === 'AX일반' 
                    ? '<span class="px-2 py-0.5 rounded-md bg-indigo-50 text-indigo-600 font-bold text-[10px]">일반</span>'
                    : '<span class="px-2 py-0.5 rounded-md bg-slate-800 text-white font-bold text-[10px]">전문</span>';

                tr.innerHTML = `
                    <td class="px-4 py-4 text-center">${typeBadge}</td>
                    <td class="px-4 py-4 font-bold text-slate-900">${course.name}</td>
                    <td class="px-4 py-4 text-center text-xs text-slate-500 whitespace-nowrap">${course.hours}시간 / ${course.days}일</td>
                    <td class="px-4 py-4 text-xs font-medium">${course.s1}</td>
                    <td class="px-4 py-4 text-xs font-medium text-slate-400">${course.s2}</td>
                    <td class="px-4 py-4 text-center">
                        <button class="px-4 py-1.5 bg-white border border-slate-200 text-indigo-600 font-bold text-xs rounded-lg hover:bg-indigo-600 hover:text-white hover:border-indigo-600 transition-all">신청</button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        function filterCurriculum(type) {
            const tabs = {
                all: document.getElementById('tab-all'),
                general: document.getElementById('tab-general'),
                expert: document.getElementById('tab-expert')
            };

            Object.values(tabs).forEach(tab => tab.classList.remove('active-tab', 'text-slate-600'));

            if (type === 'all') tabs.all.classList.add('active-tab');
            else if (type === 'AX일반') tabs.general.classList.add('active-tab');
            else tabs.expert.classList.add('active-tab');

            renderCurriculum(type);
        }

        // Initial render
        renderCurriculum();
    </script>
</body>
</html>
