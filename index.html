<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKNU AX Academy 시스템 아키텍처</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        /* 아이콘이 로드되기 전 영역 확보 */
        i[data-lucide] {
            display: inline-block;
        }
    </style>
</head>
<body class="bg-[#fcfdfe]">
    <div id="root"></div>

    <script type="text/babel">
        // Lucide 아이콘을 React에서 안전하게 사용하기 위한 컴포넌트
        const Icon = ({ name, size = 24, className = "" }) => {
            React.useEffect(() => {
                // 컴포넌트가 마운트되거나 이름이 바뀔 때 아이콘 생성 실행
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);

            return (
                <i 
                    data-lucide={name} 
                    className={className} 
                    style={{ width: size, height: size }}
                ></i>
            );
        };

        const App = () => {
            // 초기 렌더링 후 전체 아이콘 한 번 더 확인
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);

            return (
                <div className="min-h-screen p-6 md:p-10 text-slate-800">
                    <div className="max-w-5xl mx-auto">
                        {/* Header Section */}
                        <div className="text-center mb-16">
                            <div className="inline-block px-4 py-1.5 mb-4 text-xs font-bold tracking-widest text-indigo-600 uppercase bg-indigo-50 rounded-full border border-indigo-100">
                                Cloud Automation Architecture
                            </div>
                            <h1 className="text-4xl font-black text-slate-900 mb-3 tracking-tight">
                                PKNU AX Academy 스마트 운영 시스템
                            </h1>
                            <p className="text-slate-500 text-lg">
                                지능형 행정 자동화를 통한 <span className="text-indigo-600 font-semibold">고효율 교육 운영 플랫폼</span>
                            </p>
                        </div>

                        {/* 1. Main Pipeline: Data Flow */}
                        <div className="relative mb-20">
                            <div className="absolute top-0 left-0 -translate-y-8 flex items-center gap-2 text-sm font-bold text-slate-400">
                                <Icon name="line-chart" size={16} /> 데이터 수집 및 자동화 워크플로우
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-stretch">
                                {/* Frontend: Intake */}
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 hover:shadow-md transition-shadow">
                                    <div className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-indigo-100 text-white">
                                        <Icon name="globe" size={28} />
                                    </div>
                                    <h3 className="font-bold text-xl mb-2">훈련 포털 (Frontend)</h3>
                                    <p className="text-sm text-slate-500 mb-4 font-medium leading-relaxed">
                                        React 기반 통합 인터페이스를 통해 540명의 훈련생 데이터를 수집합니다.
                                    </p>
                                    <div className="pt-4 border-t border-slate-100 space-y-2">
                                        <div className="flex items-center gap-2 text-xs font-semibold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-full w-fit">
                                            GitHub Pages
                                        </div>
                                    </div>
                                </div>

                                {/* Backend: Central Hub */}
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 hover:shadow-md transition-shadow relative">
                                    <div className="absolute -left-3 top-1/2 -translate-y-1/2 hidden md:block text-slate-300">
                                        <Icon name="arrow-right" size={24} />
                                    </div>
                                    <div className="w-14 h-14 bg-emerald-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-emerald-100 text-white">
                                        <Icon name="database" size={28} />
                                    </div>
                                    <h3 className="font-bold text-xl mb-2">데이터 허브 (Backend)</h3>
                                    <p className="text-sm text-slate-500 mb-4 font-medium leading-relaxed">
                                        PostgreSQL 기반으로 데이터 무결성을 유지하며 실시간으로 데이터를 관리합니다.
                                    </p>
                                    <div className="pt-4 border-t border-slate-100">
                                        <div className="flex items-center gap-2 text-xs font-semibold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full w-fit">
                                            Supabase DB
                                        </div>
                                    </div>
                                </div>

                                {/* Automation: Action */}
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 hover:shadow-md transition-shadow relative">
                                    <div className="absolute -left-3 top-1/2 -translate-y-1/2 hidden md:block text-slate-300">
                                        <Icon name="arrow-right" size={24} />
                                    </div>
                                    <div className="w-14 h-14 bg-amber-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-amber-100 text-white">
                                        <Icon name="zap" size={28} />
                                    </div>
                                    <h3 className="font-bold text-xl mb-2">자동화 엔진 (n8n)</h3>
                                    <p className="text-sm text-slate-500 mb-4 font-medium leading-relaxed">
                                        DB 변경을 실시간 감지하여 Slack 알림 및 알림톡 API를 자동으로 트리거합니다.
                                    </p>
                                    <div className="pt-4 border-t border-slate-100">
                                        <div className="flex items-center gap-2 text-xs font-semibold text-amber-600 bg-amber-50 px-3 py-1.5 rounded-full w-fit">
                                            Workflow Server
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 2. Intelligence & Security Section */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            {/* AI Reporting */}
                            <div className="bg-slate-900 rounded-[2.5rem] p-10 text-white shadow-xl relative overflow-hidden group">
                                <div className="relative z-10">
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="p-3 bg-white/10 rounded-xl">
                                            <Icon name="bot" className="text-indigo-400" size={24} />
                                        </div>
                                        <h2 className="text-2xl font-bold tracking-tight">AI 성과 보고 체계</h2>
                                    </div>
                                    
                                    <div className="space-y-4">
                                        <p className="text-slate-400 text-sm leading-relaxed">
                                            축적된 훈련 데이터를 AI 에이전트가 쿼리하여 연말 성과 지표와 통계 보고서를 자동 생성합니다.
                                        </p>
                                        <div className="grid grid-cols-1 gap-3">
                                            <div className="flex items-center gap-3 p-4 bg-white/5 rounded-2xl border border-white/10">
                                                <Icon name="file-text" className="text-indigo-300" size={18} />
                                                <span className="text-sm font-medium ml-2">자동화 성과 통계 산출</span>
                                            </div>
                                            <div className="flex items-center gap-3 p-4 bg-white/5 rounded-2xl border border-white/10">
                                                <Icon name="check-circle" className="text-indigo-300" size={18} />
                                                <span className="text-sm font-medium ml-2">데이터 기반 의사결정 지원</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="absolute top-0 right-0 w-64 h-64 bg-indigo-500/10 rounded-full blur-3xl group-hover:bg-indigo-500/20 transition-colors"></div>
                            </div>

                            {/* Security & PIPA */}
                            <div className="bg-emerald-50 rounded-[2.5rem] p-10 border border-emerald-100 flex flex-col justify-between">
                                <div>
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="p-3 bg-emerald-500 rounded-xl text-white">
                                            <Icon name="shield-check" size={24} />
                                        </div>
                                        <h2 className="text-2xl font-bold text-emerald-950 tracking-tight">보안 및 개인정보보호</h2>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {[
                                            { title: '2단계 인증(2FA)', desc: '관리자 계정 보안', icon: 'lock' },
                                            { title: 'SSL 암호화', desc: '데이터 전송 구간', icon: 'lock' },
                                            { title: '저장 데이터 암호화', desc: 'DB 레벨 보호', icon: 'lock' },
                                            { title: '로그 감사', desc: '변경 이력 기록', icon: 'lock' }
                                        ].map((item, idx) => (
                                            <div key={idx} className="flex flex-col p-4 bg-white rounded-2xl border border-emerald-100">
                                                <div className="flex items-center gap-2 mb-1">
                                                    <Icon name={item.icon} size={12} className="text-emerald-500" />
                                                    <span className="text-sm font-bold text-emerald-900">{item.title}</span>
                                                </div>
                                                <p className="text-[11px] text-emerald-600/70 font-medium">{item.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="mt-8 text-center">
                                    <span className="text-[10px] font-black tracking-widest text-emerald-700/40 uppercase">
                                        Privacy Protection Standard
                                    </span>
                                </div>
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="mt-12 text-center">
                            <p className="text-slate-400 text-xs font-medium">
                                © 2026 PKNU AX Academy Operation Management System
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
