<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKNU AX Academy - 통합 운영 시스템</title>
    <!-- 1. 필수 라이브러리 로드 (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .pknu-blue { color: #003876; }
        .bg-pknu { background-color: #003876; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        i[data-lucide] { display: inline-block; vertical-align: middle; stroke-width: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 2. React 코드를 Babel로 변환하여 실행 (import 구문 제거 버전) -->
    <script type="text/babel">
        // 중요: 브라우저용 CDN 방식에서는 import/export를 사용하지 않습니다.
        const { useState, useEffect } = React;

        // 아이콘 렌더링용 헬퍼 컴포넌트
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const COURSE_MASTER = [
            { id: 'AX-01', type: 'AX일반', name: '생성형 AI 기반 업무 생산성 혁신 실무', hours: 16, days: 2, s1: '2026-05-16', content: 'ChatGPT, Claude 등 LLM의 실무 활용 및 자동화 기법' },
            { id: 'AX-02', type: 'AX일반', name: 'AI 윤리·보안·리스크 관리 입문', hours: 8, days: 1, s1: '2026-05-30', content: '기업용 AI 도입 시 보안 위협 및 윤리 가이드라인' },
            { id: 'AX-03', type: 'AX일반', name: '생성형 AI 업무 활용 프롬프트 설계 실무', hours: 16, days: 2, s1: '2026-06-13', content: '고급 프롬프트 엔지니어링 및 페르소나 설계' },
            { id: 'AX-08', type: 'AX전문', name: '생성형 AI 모델 파인튜닝 실무', hours: 30, days: 4, s1: '2026-06-20', content: '오픈소스 LLM(Llama 3 등) 미세 조정 및 배포' },
            { id: 'AX-09', type: 'AX전문', name: 'AI 에이전트 기반 업무 지능화 개발', hours: 30, days: 4, s1: '2026-07-18', content: 'LangChain 기반 자율형 AI 에이전트 시스템 구축' },
            { id: 'AX-10', type: 'AX전문', name: '제조물류 특화 딥러닝 이상 탐지 과정', hours: 30, days: 4, s1: '2026-08-22', content: 'CNN/RNN 기반 제조 공정 이상 탐지 알고리즘 실습' },
            { id: 'AX-11', type: 'AX전문', name: 'MLOps 기반 AI 서비스 배포 및 운영 자동화', hours: 30, days: 4, s1: '2026-09-05', content: 'Docker/K8s 기반 AI 모델 생명주기 관리 및 자동화' }
        ];

        function App() {
            const [view, setView] = useState('login');
            const [user, setUser] = useState(null);
            const [myEnrollments, setMyEnrollments] = useState([]);
            const [allEnrollments, setAllEnrollments] = useState([]);

            const handleLogin = (role) => {
                if (role === 'student') {
                    setUser({ name: '홍길동', company: '부경AX협력사', role: 'student' });
                    setView('student_home');
                } else {
                    setUser({ name: '김철수', role: 'admin' });
                    setView('admin_home');
                }
            };

            const handleApply = (course) => {
                if (myEnrollments.find(e => e.id === course.id)) {
                    alert("이미 신청한 과정입니다.");
                    return;
                }
                const newEntry = { ...course, status: 'APPLIED', appliedDate: new Date().toLocaleDateString() };
                setMyEnrollments([...myEnrollments, newEntry]);
                setAllEnrollments([...allEnrollments, { ...newEntry, userName: user.name, userCompany: user.company }]);
                alert(`${course.name} 신청이 완료되었습니다.`);
            };

            const handleComplete = (id) => {
                setAllEnrollments(prev => prev.map(e => e.id === id ? { ...e, status: 'COMPLETED' } : e));
                setMyEnrollments(prev => prev.map(e => e.id === id ? { ...e, status: 'COMPLETED' } : e));
            };

            const downloadCertificate = (course) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                doc.setDrawColor(0, 56, 118); doc.setLineWidth(2); doc.rect(10, 10, 190, 277);
                doc.setFontSize(40); doc.text('CERTIFICATE', 105, 60, { align: 'center' });
                doc.setFontSize(20); doc.text('OF COMPLETION', 105, 75, { align: 'center' });
                doc.setFontSize(25); doc.text(user.name, 105, 130, { align: 'center' });
                doc.setFontSize(14); doc.text('위 사람은 아래 교육 과정을 성공적으로 이수하였음을 증명함', 105, 155, { align: 'center' });
                doc.setFontSize(18); doc.text(course.name, 105, 180, { align: 'center' });
                doc.text(`기간: ${course.s1} (${course.hours}시간)`, 105, 195, { align: 'center' });
                doc.text(`발급일: ${new Date().toLocaleDateString()}`, 105, 230, { align: 'center' });
                doc.setFontSize(20); doc.text('부경대학교 AX 교육 센터장', 105, 260, { align: 'center' });
                doc.save(`수료증_${user.name}.pdf`);
            };

            if (view === 'login') return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="bg-white p-12 rounded-[2.5rem] shadow-2xl border border-slate-100 w-full max-w-md text-center animate-in">
                        <Icon name="award" size={64} className="mx-auto text-[#003876] mb-8" />
                        <h2 className="text-3xl font-black text-slate-900 mb-2">통합 운영 포털</h2>
                        <p className="text-slate-400 text-sm mb-10 italic">PKNU AX Academy</p>
                        <div className="space-y-4">
                            <button onClick={() => handleLogin('student')} className="w-full py-5 bg-[#003876] text-white rounded-2xl font-black text-lg hover:scale-[1.02] transition-all shadow-xl shadow-blue-900/20 flex items-center justify-center gap-3">
                                <Icon name="user" /> 훈련생 로그인
                            </button>
                            <button onClick={() => handleLogin('admin')} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg hover:scale-[1.02] transition-all shadow-xl flex items-center justify-center gap-3">
                                <Icon name="shield" /> 관리자 로그인
                            </button>
                        </div>
                        <div className="mt-8">
                            <a href="index.html" className="text-xs font-bold text-slate-300 underline underline-offset-4">아키텍처 가이드 보기</a>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 px-8 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-[#003876] p-2 rounded-xl text-white shadow-lg"><Icon name="award" /></div>
                            <h1 className="text-lg font-black text-[#003876]">PKNU AX Academy</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="text-xs font-bold">{user?.name}님</span>
                            <button onClick={() => setView('login')} className="text-slate-400 hover:text-red-500"><Icon name="log-out" size={18} /></button>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-8 animate-in">
                        {user.role === 'student' ? (
                            <div className="space-y-12">
                                <div className="flex bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200 w-fit">
                                    <button onClick={() => setView('student_home')} className={`px-8 py-3 rounded-xl text-sm font-black transition-all ${view === 'student_home' ? 'bg-[#003876] text-white shadow-md' : 'text-slate-400'}`}>교육 일정</button>
                                    <button onClick={() => setView('student_my')} className={`px-8 py-3 rounded-xl text-sm font-black transition-all ${view === 'student_my' ? 'bg-[#003876] text-white shadow-md' : 'text-slate-400'}`}>나의 수강</button>
                                </div>

                                {view === 'student_home' ? (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                        {COURSE_MASTER.map(c => (
                                            <div key={c.id} className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm hover:shadow-2xl transition-all group flex flex-col h-full">
                                                <div className="flex justify-between mb-6">
                                                    <span className="px-3 py-1 bg-slate-100 text-[10px] font-black rounded uppercase text-slate-400">{c.type}</span>
                                                    <span className="text-[10px] font-bold text-slate-300">{c.hours}시간</span>
                                                </div>
                                                <h3 className="text-xl font-bold mb-4 group-hover:text-[#003876] transition-colors leading-tight">{c.name}</h3>
                                                <p className="text-xs text-slate-400 mb-8 flex-1 font-medium leading-relaxed">{c.content}</p>
                                                <div className="flex justify-between items-center pt-6 border-t border-slate-50">
                                                    <span className="text-xs font-bold text-slate-500"><Icon name="calendar" size={14} className="mr-1 text-blue-500"/> {c.s1}</span>
                                                    <button onClick={() => handleApply(c)} className="bg-slate-50 text-xs font-black px-5 py-2.5 rounded-xl hover:bg-[#003876] hover:text-white transition-all">신청하기</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        {myEnrollments.length === 0 ? <div className="py-20 text-center bg-white rounded-[3rem] text-slate-300 font-bold italic">신청 내역이 없습니다.</div> : 
                                            myEnrollments.map(e => (
                                                <div key={e.id} className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm flex flex-col md:flex-row justify-between items-center gap-6">
                                                    <div className="flex-1">
                                                        <div className="text-[10px] font-bold text-blue-500 mb-1">{e.id}</div>
                                                        <h4 className="text-2xl font-black text-slate-800">{e.name}</h4>
                                                    </div>
                                                    <div className="flex items-center gap-8">
                                                        <span className={`text-sm font-black ${e.status === 'COMPLETED' ? 'text-emerald-600' : 'text-blue-600'}`}>
                                                            {e.status === 'COMPLETED' ? '수료 완료' : '수강 중'}
                                                        </span>
                                                        {e.status === 'COMPLETED' && <button onClick={() => downloadCertificate(e)} className="bg-[#003876] text-white p-4 rounded-2xl shadow-lg hover:scale-110 transition-all"><Icon name="printer" /></button>}
                                                    </div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-12">
                                <h2 className="text-3xl font-black text-red-600">Admin Console</h2>
                                <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                            <tr>
                                                <th className="p-8">훈련생 정보</th>
                                                <th className="p-8">신청 과정</th>
                                                <th className="p-8 text-center">상태</th>
                                                <th className="p-8 text-right">관리</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {allEnrollments.length === 0 ? <tr><td colSpan="4" className="p-20 text-center text-slate-200 font-bold">데이터가 없습니다.</td></tr> : 
                                                allEnrollments.map((e, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="p-8 font-bold text-slate-800">{e.userName}<br/><span className="text-[10px] text-slate-400 font-medium">{e.userCompany}</span></td>
                                                        <td className="p-8"><div className="text-[10px] font-black text-[#003876] mb-1">{e.id}</div><div className="font-bold text-slate-600 text-sm">{e.name}</div></td>
                                                        <td className="p-8 text-center"><span className={`px-4 py-1.5 rounded-full text-[10px] font-black ${e.status === 'COMPLETED' ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-blue-50 text-blue-600 border border-blue-100'}`}>{e.status}</span></td>
                                                        <td className="p-8 text-right">{e.status === 'APPLIED' && <button onClick={() => handleComplete(e.id)} className="bg-emerald-600 text-white px-6 py-2.5 rounded-xl text-xs font-black shadow-lg hover:bg-emerald-700 transition-all">수료 승인</button>}</td>
                                                    </tr>
                                                ))
                                            }
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-20 py-16 bg-white border-t border-slate-200 text-center">
                        <div className="flex justify-center gap-8 mb-8 text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">
                            <span>Automation</span><span>•</span><span>SQL Integrity</span><span>•</span><span>PDF Certs</span>
                        </div>
                        <p className="text-[10px] font-bold text-slate-400">&copy; 2026 PUKYONG NATIONAL UNIVERSITY. ALL RIGHTS RESERVED.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
