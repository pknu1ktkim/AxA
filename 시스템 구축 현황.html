                            <div class="code-box text-xs">
-- 1. 훈련생 정보 테이블
CREATE TABLE trainees (
  id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
  name TEXT NOT NULL,
  company TEXT,
  phone TEXT,
  email TEXT,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- 2. 훈련 신청 내역 테이블 (관련 정보 연결)
CREATE TABLE applications (
  id BIGINT PRIMARY KEY GENERATED ALWAYS AS IDENTITY,
  trainee_id UUID REFERENCES trainees(id),
  course_id TEXT NOT NULL, -- 예: AX-01
  status TEXT DEFAULT '신청완료', -- 신청완료, 승인, 수료, 취소

                        </div>

                                    <p class="text-xs text-slate-500 leading-relaxed font-medium">Resource: Row<br>Operation: Created<br>Table: applications<br>데이터가 생성되는 즉시 워크플로우 시작</p>

                                </div>

                                    <p class="text-xs text-slate-500 leading-relaxed font-medium">Database: 훈련생 관리 DB<br>Action: Create Page<br>모든 훈련생 정보를 자동 아카이빙</p>
                                </div>
                                <div class="p-6 bg-slate-50 rounded-2xl border border-slate-200 flex items-center justify-center">
                                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">+ 알림톡 API 연동 예정</p>
                                </div>
                            </div>
                        </div>
                        <div class="pknu-card p-8 bg-slate-900 text-white border-none relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-8 opacity-10 text-6xl font-black italic">Demo</div>
                            <h5 class="font-bold mb-4">현장 시연 시나리오 (준비물)</h5>

                                <li class="flex items-center gap-2"><span class="w-1.5 h-1.5 bg-blue-500 rounded-full"></span> n8n Desktop App 또는 Cloud 계정 로그인 상태 유지</li>
                                <li class="flex items-center gap-2"><span class="w-1.5 h-1.5 bg-blue-500 rounded-full"></span> 팀장님 스마트폰 Slack 앱 알림 소리 활성화</li>
                                <li class="flex items-center gap-2"><span class="w-1.5 h-1.5 bg-blue-500 rounded-full"></span> 평가위원이 보는 앞에서 테스트 신청 수행 시연</li>
                            </ul>

            step3: {
                title: "STEP 3. GPU 인프라 관제 (Infrastructure Monitoring)",
                intro: "고가의 GPU 자원을 보호하고 교육의 중단 없는 진행을 보장하기 위한 관제 시스템입니다. Prometheus로 데이터를 수집하고 Grafana로 시각화합니다.",
                content: `

                            <p class="text-sm text-slate-500 mb-6 font-medium leading-relaxed">Prometheus Alertmanager를 통해 팀장님 슬랙으로 전송되는 경고 규칙입니다.</p>

            },

                content: `
                    <div class="space-y-10">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="p-6 pknu-card border-slate-100 text-center">
                                <div class="text-3xl mb-3">🛡️</div>
                                <h6 class="font-bold text-slate-800 text-sm">2단계 인증 (2FA)</h6>
                                <p class="text-[10px] text-slate-400 mt-2 font-medium leading-relaxed">Supabase/n8n/Slack 모든 관리 계정에 OTP 인증 적용</p>

        // --- Interaction Handlers ---
        let mainChart = null;

        function renderStep(id) {

            if (activeBtn) activeBtn.classList.add('nav-active');

            // Update Content
            const data = stepData[id];
            const container = document.getElementById('step-content');
            
            container.classList.remove('animate-fade');
            void container.offsetWidth; // Trigger reflow

            container.innerHTML = `
                <div class="mb-12">
                    <h2 class="text-3xl font-black text-slate-900 tracking-tight mb-4">${data.title}</h2>
                    <p class="text-lg text-slate-500 leading-relaxed font-medium">${data.intro}</p>
                </div>
                ${data.content}
            `;
            container.classList.add('animate-fade');

            if (id === 'intro') initChart();
        }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (mainChart) mainChart.destroy();
            
            mainChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['DB (Step 1)', 'Auto (Step 2)', 'Infra (Step 3)', 'Security (Step 4)'],
                    datasets: [{
                        label: '구축 완성도 (%)',
                        data: [100, 95, 88, 85],
                        backgroundColor: '#003876',
                        borderRadius: 8
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { beginAtZero: true, max: 100, grid: { display: false } }, y: { grid: { display: false } } }
                }
            });
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            renderStep('intro');
        });
    </script>
</body>
</html>
